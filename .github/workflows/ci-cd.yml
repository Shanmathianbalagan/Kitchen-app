name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install
        run: npm ci
        working-directory: api
      - name: Lint
        run: npm run lint
        working-directory: api
      - name: Test
        run: npm test
        working-directory: api

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t kitchen-api:local ./api --target production
      - name: Build Web UI image
        run: docker build -t kitchen-web:local ./web-ui
